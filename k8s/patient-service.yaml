apiVersion: apps/v1
kind: Deployment
metadata:
  name: patient-service
  namespace: healthcare-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: patient-service
  template:
    metadata:
      labels:
        app: patient-service
    spec:
      containers:
      - name: patient-service
        image: healthcare-system-patient-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: healthcare-config
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: patient-service
  namespace: healthcare-system
spec:
  selector:
    app: patient-service
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP
