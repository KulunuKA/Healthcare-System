apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: healthcare-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: healthcare-system-gateway:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: healthcare-config
        env:
        - name: PATIENT_SERVICE_URL
          value: "http://patient-service:3001"
        - name: DOCTOR_SERVICE_URL
          value: "http://doctor-service:3002"
        - name: APPOINTMENT_SERVICE_URL
          value: "http://appointment-service:3003"
        - name: TELEMEDICINE_SERVICE_URL
          value: "http://telemedicine-service:3004"
        - name: PAYMENT_SERVICE_URL
          value: "http://payment-service:3005"
        - name: NOTIFICATION_SERVICE_URL
          value: "http://notification-service:3006"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: healthcare-system
spec:
  selector:
    app: gateway
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer
