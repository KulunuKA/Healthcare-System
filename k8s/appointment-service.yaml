apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  namespace: healthcare-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
      - name: appointment-service
        image: healthcare-system-appointment-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3003
        envFrom:
        - configMapRef:
            name: healthcare-config
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: appointment-service
  namespace: healthcare-system
spec:
  selector:
    app: appointment-service
  ports:
  - port: 3003
    targetPort: 3003
  type: ClusterIP
