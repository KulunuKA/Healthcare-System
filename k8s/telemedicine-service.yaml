apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine-service
  namespace: healthcare-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine-service
  template:
    metadata:
      labels:
        app: telemedicine-service
    spec:
      containers:
      - name: telemedicine-service
        image: healthcare-system-telemedicine-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3004
        envFrom:
        - configMapRef:
            name: healthcare-config
        livenessProbe:
          httpGet:
            path: /health
            port: 3004
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: telemedicine-service
  namespace: healthcare-system
spec:
  selector:
    app: telemedicine-service
  ports:
  - port: 3004
    targetPort: 3004
  type: ClusterIP
