apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: healthcare-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: healthcare-system-notification-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3006
        envFrom:
        - configMapRef:
            name: healthcare-config
        livenessProbe:
          httpGet:
            path: /health
            port: 3006
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: healthcare-system
spec:
  selector:
    app: notification-service
  ports:
  - port: 3006
    targetPort: 3006
  type: ClusterIP
