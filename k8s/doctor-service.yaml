apiVersion: apps/v1
kind: Deployment
metadata:
  name: doctor-service
  namespace: healthcare-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: doctor-service
  template:
    metadata:
      labels:
        app: doctor-service
    spec:
      containers:
      - name: doctor-service
        image: healthcare-system-doctor-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: healthcare-config
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: doctor-service
  namespace: healthcare-system
spec:
  selector:
    app: doctor-service
  ports:
  - port: 3002
    targetPort: 3002
  type: ClusterIP
